<html>
    <head>
        <title>
            Typography
        </title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

        </script>

        <style>
           hr{
            border-color:chocolate;
            border-radius:10px solid brown;
           } 

           body{
            background-image:linear-gradient(to bottom, red, orange, yellow);
            font-family: 'Times New Roman', Times, serif;
           }

           
           .DYK{
            color:red;
            size:20px;
           }

           .mark{
            color:red;
            size:20px;
           }

           h2{
            color:darkred;
           }
        </style>
    </head>

    <body>
        <p class="display-1">MY FOOD COURT</p>
        <p class="display-2">My Top Dish</p>
        <p class="display-3">Fun Food Facts </p>
        <p class="display-4">Amazing food<small>   BY Aveer</small></p>

        <hr></hr>

        <h2>
            Did you know
        </h2>
        
        <p class="DYK">Pizza is our <mark class="mark">most famous</mark> Dish having been on our menu for almost <b>ten years!</b></p>

        <hr></hr>
        
        <h2>
            Famous Food Quote
        </h2>

        <p class="FFQ">
            <blockquote>
               "One cannot think well, love well, sleep well, if one has not dined well."
               <br>
               <b>-Virginia Woolf</b>
            </blockquote>
        </p>
    </body>
</html>
