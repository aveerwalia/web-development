<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Functions in Javascript 1
        </title>
    </head>

    <body>
        <p>
            A function can access variables inside function
        </p>

        <p id="demo"></p>
        <p id="demo2"></p>
        
        <button onclick="myfunction()"> Click Me!</button>

        <script>
            function myfunction(){
                var a=4;
                var b=5;

                document.getElementById ("demo").innerHTML=a * b;
            }
        </script>
    </body>
</html>
