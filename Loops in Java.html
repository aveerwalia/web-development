<!DOCTYPE html>
<html>
<head>
    <title>
        Loops in Javascript
    </title>
</head>

<body>
    <h2>
        Javascript for Loop
    </h2>

    <p id="demo"></p>

    <script>
        var fruits = ["Apple", "Watermelon", "Grapes", "Banana", "Orange", "Rockmelon", "Strawberry"];

        var text = "";

        var i;

        for (i = 0; i <fruits.length; i++) {
            text += fruits [i] + "<br>";
        }

        document.getElementById("demo").innerHTML = text;
    </script>
</body>
</html>
