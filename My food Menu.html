<html>
    <head>
        <title>
            My Food Menu
        </title>

        <style>
        body {
            font-family:Arial, Helvetica, sans-serif;
            color:orange;
            text-align:center;
            padding:30px;
            background-image:linear-gradient(to top, orange, brown);
        }

        h1 {
            color:rgb(255, 162, 0);
        }

        h1 + p {
        background-color:burlywood;
        padding:10px 20px;
        color:crimson;
        display:inline-block;
        border-radius:8px;
        }

        ul > li {
            list-style:none;
            font-size:18px;
            font-weight:bold;
            color:darkred;
            padding:10px 20px;
            margin:6px auto;
            width:280px;
            border-radius:8px;
            background-color:orangered;
        }

        .description{
            color:rgba(156, 44, 0, 0.884);
            font-size:16px;
            font-family:'Times New Roman', Times, serif;
        }

        a {
            font-size:20px;
            color:rgba(156, 44, 0, 0.884);
        }
        </style>

    </head>

    <body>
        <h1>
            My Food Menu
        </h1>

        <p>
            pick your favourite dish and dig in.
        </p>

        <ul>
            <li>Pizza</li>
            <li>Pasta</li>
            <li>Burger</li>
            <li>Chicken</li>
            <li>Salad</li>
        </ul>

        <p class="description">
            Every dish in this menu is made with lots of love and loads of flavour. Try them all and find your favourite.
        </p>

        <div class="links">
        <a href="#">order now</a>
        <a href="#">see more</a>     
        </div>
    </body>
</html>
