<html>
    <head>
        <title>
            My Animal Safari
        </title>

        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

        </script>
    </head>

    <body data-spy="scroll" data-target="#safarinav" data-offset="60">

        <h1 class="display 3">
            My Animal Safari
        </h1>

        <div id="safaricarousel" class="carousel slide" data-ride="carousel">

            <ol class="carousel-indicators">
                <li data-target="#safaricarousel" data-slide-to="0" class="active"></li>
                <li data-target="#safaricarousel" data-slide-to="1"></li>
                <li data-target="#safaricarousel" data-slide-to="2"></li>
            </ol>

            <div class="carousel-inner">
                <div class="carousel-item active safari-slide slide-forest">
                    Forest Safari
                </div>

                <div class="carousel-item safari-slide slide-ocean">
                    Ocean Safari
                </div>

                <div class="carousel-item safari-slide slide-desert">
                    Desert Safari
                </div>

                <a class="carousel-control-prev" href="safari-carousel" data-slide="prev"></a>
            </div>
        </div>
    </body>
</html>
