<html>
    <head>
        <title>
            Science Lab
        </title>

        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

        </script>
    </head>

    <body>
        <div class="jumbotron jumbotron-fluid">
            <div class="container bg-dark text-white p-3 my-3 border border-dark">
                <h1>My Science Lab</h1>

                <p class="lead">Welcome to the lab!
                    <br>
                    <small>This is where we do all our experiments.</small>
                </p>
            </div>
        </div>

        <button class="btn btn-primary">
            Science
        </button>

        <button class="btn btn-info">
            Chemistry
        </button>

        <button class="btn btn-warning">            
            Astronomy
        </button>
            
        <button class="btn btn-danger">
            Biology
        </button>
                 
        <br><div class="container">
            <h2 class="title">
                Experiments completed <span class="badge badge-danger">17</span>
            </h2>

            <p class="p">
                Science <span class="badge badge-primary">1</span>
            </p>

            <p class="p">
                Chemistry <span class="badge badge-info">7</span>
            </p>

            <p class="p">
                Astronomy <span class="badge badge-warning">6</span>
            </p>

            <p class="p">
                Biology <span class="badge badge-danger">3</span>
            </p>
        </div>

        <div class="section">
            <h2>
                Research
            </h2>
            Research Progress
            <div class="progress-bar bg-primary" style="width:40%">
                40%
            </div>

            <div class="progress-bar bg-info" style="width:100%">
                100%
            </div>

            <div class="progress-bar bg-warning" style="width:65%">
                65%
            </div>

            <div class="progress-bar bg-danger" style="width:80%">
                80%
            </div>
        </div>
    </body>
</html>
